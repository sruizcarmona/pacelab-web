<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Pages Test Site</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 400px;
            border-top: 5px solid #f48120; /* Cloudflare Orange */
        }
        h1 {
            color: #f48120;
            margin-top: 0;
            font-size: 1.75rem;
        }
        p {
            line-height: 1.5;
            color: #4b5563;
        }
        .status-badge {
            background-color: #d1fae5;
            color: #065f46;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Cloudflare Pages Test</h1>
        <p>If you can see this webpage, your deployment to Cloudflare Pages was fully successful!</p>
        <div class="status-badge">Status: Live & Fast</div>
    </div>

</body>
</html>
